<!DOCTYPE html>
<html>
<head>
<title>Bus Booking</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    text-align: center;
}

.box {
    background: white;
    padding: 25px;
    margin: 40px auto;
    width: 400px;
    border-radius: 12px;
    box-shadow: 0 0 15px #ccc;
}

select, button {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    background: #28a745;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #218838;
}
</style>
</head>

<body>

<div class="box">
    <h2>🚌 Bus Booking</h2>

    <!-- ROUTE -->
    <select id="route"></select>

    <!-- OPERATOR -->
    <select id="operator"></select>

    <!-- PAYMENT -->
    <select id="payment">
        <option value="bkash">bKash</option>
        <option value="card">Card</option>
    </select>

    <button onclick="book('Bus')">Book Bus</button>
</div>

<script src="/static/script.js"></script>

<script>
loadBusRoutes();
</script>

</body>
</html>

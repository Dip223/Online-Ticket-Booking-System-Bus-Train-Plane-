<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BD Ticket — Bus Schedules</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--g:#16a34a;--gd:#14532d;--gl:#dcfce7;--nav:#0f172a;--bg:#f0f4f8;--white:#fff;--txt:#0f172a;--sub:#64748b;--bdr:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
nav{background:var(--nav);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-box{width:38px;height:38px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff}
.logo-name{font-family:'Syne',sans-serif;font-size:21px;font-weight:900;color:#fff}
.logo-name span{color:var(--g)}
.nav-r{display:flex;align-items:center;gap:10px}
.nav-user{color:rgba(255,255,255,.7);font-size:13px;background:rgba(255,255,255,.07);padding:8px 14px;border-radius:8px}
.btn-logout{background:transparent;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15);padding:8px 16px;border-radius:8px;cursor:pointer}

.hero{background:linear-gradient(135deg,#0f172a 0%,#14532d 100%);padding:30px 40px;color:#fff}
.hero h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:900}
.hero h1 i{color:#16a34a;margin-right:10px}
.trip-info{margin-top:15px;display:flex;gap:30px;flex-wrap:wrap;background:rgba(255,255,255,.1);padding:15px 20px;border-radius:12px}
.trip-info span{font-size:14px}
.trip-info i{margin-right:8px;color:#16a34a}

.container{max-width:1000px;margin:0 auto;padding:30px 24px}
.filter-bar{background:#fff;border-radius:16px;padding:20px;margin-bottom:30px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.filter-bar h3{margin-bottom:15px;font-size:14px;color:var(--sub)}
.operator-filters{display:flex;gap:12px;flex-wrap:wrap}
.filter-chip{padding:8px 16px;border:2px solid var(--bdr);border-radius:50px;cursor:pointer;font-size:13px;font-weight:600;background:#fff}
.filter-chip:hover{border-color:var(--g)}
.filter-chip.active{background:var(--g);color:#fff}
.reset-btn{padding:8px 20px;background:#f1f5f9;border:none;border-radius:8px;cursor:pointer;margin-left:15px;font-weight:600}

.schedule-grid{display:flex;flex-direction:column;gap:16px}

.schedule-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08);transition:.2s;border:1px solid #e2e8f0}
.schedule-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}

.card-header{background:#f8fafc;padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.operator-name{font-size:18px;font-weight:900;font-family:'Syne',sans-serif;color:var(--txt)}
.operator-name i{margin-right:8px;color:var(--g)}
.vehicle-info{font-size:12px;color:var(--sub);margin-top:4px}

.card-body{padding:20px}

.time-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:15px}
.time-item{text-align:center}
.time-departure{font-size:24px;font-weight:900;color:var(--txt)}
.time-arrival{font-size:24px;font-weight:900;color:var(--txt)}
.time-label{font-size:11px;color:var(--sub);margin-top:4px}
.duration-badge{background:#f1f5f9;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:600;color:var(--sub)}
.duration-badge i{margin-right:6px}

.details-row{display:flex;gap:20px;margin-bottom:20px;padding:15px 0;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0}
.detail-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--sub)}
.detail-item i{width:20px;color:var(--g);font-size:14px}

.seats-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.seats-available{color:var(--g);font-weight:800;font-size:15px}
.seats-available i{margin-right:6px}
.price{font-size:22px;font-weight:900;color:var(--g);font-family:'Syne',sans-serif}

.facilities{display:flex;gap:8px;flex-wrap:wrap;margin:15px 0}
.facility{background:#f1f5f9;padding:4px 10px;border-radius:15px;font-size:11px;color:var(--sub)}

.book-btn{width:100%;padding:14px;background:linear-gradient(135deg,#16a34a,#14532d);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.book-btn:hover{transform:scale(1.01);box-shadow:0 4px 12px rgba(22,163,74,.3)}

.back-btn{display:inline-flex;align-items:center;gap:8px;margin-top:30px;padding:12px 24px;background:#f1f5f9;border:none;border-radius:10px;cursor:pointer;font-weight:600}

.toast{position:fixed;bottom:24px;right:24px;background:var(--nav);color:#fff;padding:14px 20px;border-radius:12px;transform:translateY(80px);opacity:0;transition:.3s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.loading{text-align:center;padding:60px}
</style>
</head>
<body>

<nav>
  <a href="/dashboard" class="logo">
    <div class="logo-box"><i class="fas fa-ticket-alt"></i></div>
    <div class="logo-name">BD<span>Ticket</span></div>
  </a>
  <div class="nav-r">
    <div class="nav-user"><i class="fas fa-user-circle"></i><span id="navName">User</span></div>
    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Logout</button>
  </div>
</nav>

<div class="hero">
  <h1><i class="fas fa-bus"></i> Select Bus Schedule</h1>
  <div class="trip-info" id="tripInfo"></div>
</div>

<div class="container">
  <div class="filter-bar">
    <h3><i class="fas fa-filter"></i> Filter by Operator</h3>
    <div class="operator-filters" id="operatorFilters"></div>
    <button class="reset-btn" onclick="resetFilters()">Reset All</button>
  </div>

  <div class="schedule-grid" id="scheduleGrid">
    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading schedules...</div>
  </div>

  <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back to Search</button>
</div>

<div class="toast" id="toast"></div>

<script>
let allSchedules = [];
let filteredSchedules = [];
let selectedOperator = "all";

const journeyData = JSON.parse(sessionStorage.getItem('bus_selection') || '{}');

function showToast(msg, type) {
  const el = document.getElementById("toast");
  el.innerHTML = `<i class="fas fa-${type==='ok'?'check-circle':'exclamation-circle'}"></i> ${msg}`;
  el.className = "toast " + (type||"ok") + " show";
  setTimeout(() => el.classList.remove("show"), 3500);
}

async function loadSchedules() {
  try {
    const response = await fetch("http://127.0.0.1:5000/schedules/bus");
    allSchedules = await response.json();
    filteredSchedules = [...allSchedules];
    
    document.getElementById("tripInfo").innerHTML = `
      <span><i class="fas fa-map-marker-alt"></i> From: ${journeyData.source || 'N/A'}</span>
      <span><i class="fas fa-map-pin"></i> To: ${journeyData.destination || 'N/A'}</span>
      <span><i class="fas fa-calendar"></i> Date: ${journeyData.journeyDate || 'N/A'}</span>
      <span><i class="fas fa-tag"></i> Base Price: ৳${journeyData.price || 'N/A'}</span>
    `;
    
    const operators = [...new Set(allSchedules.map(s => s.operator))];
    const filtersDiv = document.getElementById("operatorFilters");
    filtersDiv.innerHTML = `<div class="filter-chip active" onclick="filterByOperator('all')">All Operators</div>`;
    operators.forEach(op => {
      filtersDiv.innerHTML += `<div class="filter-chip" data-op="${op}" onclick="filterByOperator('${op}')">${op}</div>`;
    });
    
    displaySchedules(filteredSchedules);
  } catch(err) {
    console.error(err);
    document.getElementById("scheduleGrid").innerHTML = '<div class="loading">Error loading schedules. Please try again.</div>';
  }
}

function displaySchedules(schedules) {
  const container = document.getElementById("scheduleGrid");
  
  if (schedules.length === 0) {
    container.innerHTML = '<div class="loading">No schedules found for this filter.</div>';
    return;
  }
  
  container.innerHTML = schedules.map(schedule => `
    <div class="schedule-card">
      <div class="card-header">
        <div>
          <div class="operator-name">
            <i class="fas fa-building"></i> ${schedule.operator}
          </div>
          <div class="vehicle-info">
            <i class="fas fa-bus"></i> ${schedule.vehicle} | ${schedule.total_seats} Seats
          </div>
        </div>
      </div>
      
      <div class="card-body">
        <div class="time-row">
          <div class="time-item">
            <div class="time-departure">${schedule.departure}</div>
            <div class="time-label">Departure</div>
          </div>
          <div class="duration-badge">
            <i class="fas fa-clock"></i> ${schedule.duration}
          </div>
          <div class="time-item">
            <div class="time-arrival">${schedule.arrival}</div>
            <div class="time-label">Arrival</div>
          </div>
        </div>
        
        <div class="details-row">
          <div class="detail-item"><i class="fas fa-chair"></i> Total Seats: ${schedule.total_seats}</div>
        </div>
        
        <div class="facilities">
          ${schedule.facilities.map(f => `<span class="facility"><i class="fas fa-check-circle"></i> ${f}</span>`).join('')}
        </div>
        
        <div class="seats-row">
          <div class="seats-available">
            <i class="fas fa-ticket-alt"></i> Total Seats: ${schedule.total_seats}
          </div>
          <div class="price">৳ ${journeyData.price}</div>
        </div>
        
        <button class="book-btn" onclick="bookNow('${schedule.operator}', '${schedule.departure}', '${schedule.arrival}')">
          <i class="fas fa-ticket-alt"></i> Select & Continue
        </button>
      </div>
    </div>
  `).join('');
}

function filterByOperator(operator) {
  selectedOperator = operator;
  
  document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
  if (operator === 'all') {
    filteredSchedules = [...allSchedules];
    document.querySelector('.filter-chip').classList.add('active');
  } else {
    filteredSchedules = allSchedules.filter(s => s.operator === operator);
    document.querySelector(`.filter-chip[data-op="${operator}"]`).classList.add('active');
  }
  
  displaySchedules(filteredSchedules);
}

function resetFilters() {
  filterByOperator('all');
}

function bookNow(operator, departureTime, arrivalTime) {
  journeyData.operator = operator;
  journeyData.departure_time = departureTime;
  journeyData.arrival_time = arrivalTime;
  sessionStorage.setItem('bus_selection', JSON.stringify(journeyData));
  
  showToast(`Selected ${operator} at ${departureTime}`, "ok");
  setTimeout(() => {
    window.location = "/bus-payment";
  }, 800);
}

function goBack() {
  window.location = "/bus";
}

function logout() { localStorage.clear(); window.location = "/"; }

window.onload = function() {
  if (!localStorage.getItem("token")) { window.location = "/"; return; }
  if (!journeyData.source || !journeyData.destination) {
    window.location = "/bus";
    return;
  }
  const name = localStorage.getItem("name") || "User";
  document.getElementById("navName").textContent = name;
  loadSchedules();
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BD Ticket — Bus Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--g:#16a34a;--gd:#14532d;--gl:#dcfce7;--nav:#0f172a;--bg:#f0f4f8;--white:#fff;--txt:#0f172a;--sub:#64748b;--bdr:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
nav{background:var(--nav);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-box{width:38px;height:38px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff}
.logo-name{font-family:'Syne',sans-serif;font-size:21px;font-weight:900;color:#fff}
.logo-name span{color:var(--g)}
.nav-r{display:flex;align-items:center;gap:10px}
.nav-user{color:rgba(255,255,255,.7);font-size:13px;background:rgba(255,255,255,.07);padding:8px 14px;border-radius:8px}
.btn-logout{background:transparent;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15);padding:8px 16px;border-radius:8px;cursor:pointer}

.hero{background:linear-gradient(135deg,#0f172a 0%,#14532d 100%);padding:30px 40px;color:#fff}
.hero h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:900}
.hero h1 i{color:#16a34a;margin-right:10px}
.hero .trip-info{margin-top:15px;display:flex;gap:30px;flex-wrap:wrap;background:rgba(255,255,255,.1);padding:15px 20px;border-radius:12px}
.trip-info span{font-size:14px}
.trip-info i{margin-right:8px;color:#16a34a}

.container{max-width:1200px;margin:0 auto;padding:30px 24px}
.filter-bar{background:#fff;border-radius:16px;padding:20px;margin-bottom:30px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.filter-bar h3{margin-bottom:15px;font-size:14px;color:var(--sub)}
.operator-filters{display:flex;gap:12px;flex-wrap:wrap}
.filter-chip{padding:8px 16px;border:2px solid var(--bdr);border-radius:50px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;background:#fff}
.filter-chip:hover{border-color:var(--g)}
.filter-chip.active{background:var(--g);color:#fff;border-color:var(--g)}
.reset-btn{padding:8px 20px;background:#f1f5f9;border:none;border-radius:8px;cursor:pointer;margin-left:15px;font-weight:600}

.schedule-grid{display:flex;flex-direction:column;gap:16px}
.schedule-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.05);transition:.2s;border:2px solid transparent}
.schedule-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1);border-color:var(--g)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.operator-name{font-size:20px;font-weight:900;font-family:'Syne',sans-serif;color:var(--txt)}
.operator-name i{margin-right:8px;color:var(--g)}
.price-badge{background:var(--gl);color:var(--gd);padding:8px 16px;border-radius:50px;font-weight:800;font-size:18px}
.details-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:15px 0}
.detail-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--sub)}
.detail-item i{width:20px;color:var(--g)}
.departure-times{display:flex;gap:10px;flex-wrap:wrap;margin:15px 0}
.time-slot{background:#f1f5f9;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600}
.facilities{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.facility{background:#f1f5f9;padding:4px 10px;border-radius:15px;font-size:11px}
.select-time-btn{margin-top:15px;padding:10px 20px;background:var(--g);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;width:100%}
.select-time-btn:hover{background:var(--gd)}

.back-btn{display:inline-flex;align-items:center;gap:8px;margin-top:30px;padding:12px 24px;background:#f1f5f9;border:none;border-radius:10px;cursor:pointer;font-weight:600}
.toast{position:fixed;bottom:24px;right:24px;background:var(--nav);color:#fff;padding:14px 20px;border-radius:12px;transform:translateY(80px);opacity:0;transition:.3s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<nav>
  <a href="/dashboard" class="logo">
    <div class="logo-box"><i class="fas fa-ticket-alt"></i></div>
    <div class="logo-name">BD<span>Ticket</span></div>
  </a>
  <div class="nav-r">
    <div class="nav-user"><i class="fas fa-user-circle"></i><span id="navName">User</span></div>
    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Logout</button>
  </div>
</nav>

<div class="hero">
  <h1><i class="fas fa-bus"></i> Select Bus Schedule</h1>
  <div class="trip-info" id="tripInfo"></div>
</div>

<div class="container">
  <div class="filter-bar">
    <h3><i class="fas fa-filter"></i> Filter Operators</h3>
    <div class="operator-filters" id="operatorFilters"></div>
    <button class="reset-btn" onclick="resetFilters()">Reset All</button>
  </div>

  <div class="schedule-grid" id="scheduleGrid"></div>

  <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back to Search</button>
</div>

<div class="toast" id="toast"></div>

<script>
let operatorsData = [];
let selectedFilters = new Set();

const journeyData = JSON.parse(sessionStorage.getItem('bus_selection') || '{}');

function showToast(msg, type) {
  const el = document.getElementById("toast");
  el.innerHTML = `<i class="fas fa-${type==='ok'?'check-circle':'exclamation-circle'}"></i> ${msg}`;
  el.className = "toast " + (type||"ok") + " show";
  setTimeout(() => el.classList.remove("show"), 3500);
}

async function loadSchedules() {
  try {
    const response = await fetch("http://127.0.0.1:5000/operators/bus/schedules");
    operatorsData = await response.json();
    
    document.getElementById("tripInfo").innerHTML = `
      <span><i class="fas fa-map-marker-alt"></i> From: ${journeyData.source || 'N/A'}</span>
      <span><i class="fas fa-map-pin"></i> To: ${journeyData.destination || 'N/A'}</span>
      <span><i class="fas fa-calendar"></i> Date: ${journeyData.journeyDate || 'N/A'}</span>
      <span><i class="fas fa-tag"></i> Price: ৳${journeyData.price || 'N/A'}</span>
    `;
    
    const filtersDiv = document.getElementById("operatorFilters");
    filtersDiv.innerHTML = `<div class="filter-chip ${selectedFilters.size === 0 ? 'active' : ''}" onclick="filterByOperator('all')">All Operators</div>`;
    
    operatorsData.forEach(op => {
      filtersDiv.innerHTML += `<div class="filter-chip" data-op="${op.name}" onclick="filterByOperator('${op.name}')">${op.name}</div>`;
    });
    
    displaySchedules(operatorsData);
  } catch(err) {
    console.error(err);
    showToast("Error loading schedules", "err");
  }
}

function displaySchedules(operators) {
  const container = document.getElementById("scheduleGrid");
  
  if (operators.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:60px;background:#fff;border-radius:16px;">No operators found for this route</div>';
    return;
  }
  
  container.innerHTML = operators.map(op => `
    <div class="schedule-card">
      <div class="card-header">
        <div class="operator-name">
          <i class="fas fa-building"></i> ${op.name}
        </div>
        <div class="price-badge">৳ ${journeyData.price}</div>
      </div>
      
      <div class="details-grid">
        <div class="detail-item"><i class="fas fa-clock"></i> Duration: ${op.duration}</div>
        <div class="detail-item"><i class="fas fa-chair"></i> Total Seats: ${op.total_seats}</div>
        <div class="detail-item"><i class="fas fa-bus"></i> Vehicle: ${op.vehicle_type}</div>
      </div>
      
      <div class="departure-times">
        <strong>Departure Times:</strong>
        ${op.departure_times.map(time => `<span class="time-slot">${time}</span>`).join('')}
      </div>
      
      <div class="facilities">
        <strong>Facilities:</strong>
        ${op.facilities.map(f => `<span class="facility">${f}</span>`).join('')}
      </div>
      
      <button class="select-time-btn" onclick="selectOperator('${op.name}')">
        <i class="fas fa-arrow-right"></i> Select This Operator
      </button>
    </div>
  `).join('');
}

function filterByOperator(operatorName) {
  document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
  if (operatorName === 'all') {
    selectedFilters.clear();
    document.querySelector('.filter-chip').classList.add('active');
    displaySchedules(operatorsData);
  } else {
    selectedFilters.clear();
    selectedFilters.add(operatorName);
    const filtered = operatorsData.filter(op => op.name === operatorName);
    displaySchedules(filtered);
    document.querySelector(`.filter-chip[data-op="${operatorName}"]`).classList.add('active');
  }
}

function resetFilters() {
  selectedFilters.clear();
  document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
  document.querySelector('.filter-chip').classList.add('active');
  displaySchedules(operatorsData);
}

function selectOperator(operatorName) {
  journeyData.operator = operatorName;
  sessionStorage.setItem('bus_selection', JSON.stringify(journeyData));
  showToast(`Selected ${operatorName}. Proceeding to payment...`, "ok");
  setTimeout(() => {
    window.location = "/bus-payment";
  }, 1000);
}

function goBack() {
  window.location = "/bus";
}

function logout() { localStorage.clear(); window.location = "/"; }

window.onload = function() {
  if (!localStorage.getItem("token")) { window.location = "/"; return; }
  if (!journeyData.source || !journeyData.destination) {
    window.location = "/bus";
    return;
  }
  const name = localStorage.getItem("name") || "User";
  document.getElementById("navName").textContent = name;
  loadSchedules();
};
</script>
</body>
</html>

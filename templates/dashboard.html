<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BD Ticket — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--g:#16a34a;--gd:#14532d;--gl:#dcfce7;--nav:#0f172a;--bg:#f1f5f9;--white:#fff;--txt:#0f172a;--sub:#64748b;--bdr:#e2e8f0;--shd:0 2px 16px rgba(0,0,0,.07)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt)}

/* NAV */
nav{background:var(--nav);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.25)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-box{width:36px;height:36px;background:var(--g);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
.logo-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:900;color:#fff}
.logo-name span{color:var(--g)}
.nav-tabs{display:flex;height:100%}
.nt{display:flex;align-items:center;gap:7px;padding:0 18px;color:rgba(255,255,255,.5);font-size:13px;font-weight:600;text-decoration:none;border-bottom:3px solid transparent;transition:.2s}
.nt:hover,.nt.act{color:var(--g);border-bottom-color:var(--g)}
.nav-r{display:flex;align-items:center;gap:10px}
.nav-r button{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.12);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px;transition:.2s}
.nav-r button:hover{background:rgba(255,255,255,.14);color:#fff}

/* HERO SEARCH */
.hero-bar{background:linear-gradient(145deg,#0f172a,#052e16);padding:40px}
.hero-bar h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:900;color:#fff;margin-bottom:5px}
.hero-bar h1 span{color:var(--g)}
.hero-bar p{color:rgba(255,255,255,.45);font-size:13px;margin-bottom:28px}

/* SEARCH WIDGET */
.sw{background:#fff;border-radius:18px;padding:26px;box-shadow:0 16px 50px rgba(0,0,0,.22)}
.transport-tabs{display:flex;gap:4px;margin-bottom:22px}
.tt{padding:9px 22px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:7px;transition:.2s;background:#f1f5f9;color:var(--sub)}
.tt.act{background:var(--g);color:#fff}
.tt:hover:not(.act){background:var(--gl);color:var(--g)}
.search-row{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
.sf{flex:1;min-width:130px}
.sf label{font-size:11px;font-weight:700;color:var(--sub);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.sf select{width:100%;padding:12px 14px;border:2px solid var(--bdr);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--txt);background:#f8fafc;transition:.2s;appearance:none;cursor:pointer}
.sf select:focus{outline:none;border-color:var(--g);background:#fff}
.price-badge{background:var(--gl);color:var(--g);border-radius:10px;padding:12px 18px;font-size:15px;font-weight:900;white-space:nowrap;border:2px solid rgba(22,163,74,.25);min-width:110px;text-align:center}
.btn-book{padding:13px 28px;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;font-family:'DM Sans',sans-serif;cursor:pointer;transition:.25s;display:flex;align-items:center;gap:8px;white-space:nowrap}
.btn-book:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(22,163,74,.35)}

/* PAYMENT PILLS */
.pay-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.pay-pill{padding:8px 16px;border:2px solid var(--bdr);border-radius:50px;cursor:pointer;font-size:12px;font-weight:700;transition:.2s;background:#f8fafc;color:var(--sub);display:flex;align-items:center;gap:6px}
.pay-pill.sel{border-color:var(--g);background:var(--gl);color:var(--g)}
.pay-pill:hover:not(.sel){border-color:var(--g);color:var(--g)}

/* MAIN */
.main{max-width:1140px;margin:0 auto;padding:32px 20px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.sc{background:#fff;border-radius:14px;padding:20px 22px;box-shadow:var(--shd);display:flex;align-items:center;gap:14px;border-left:4px solid var(--g)}
.sc.blue{border-left-color:#3b82f6}
.sc.orange{border-left-color:#f97316}
.sc.purple{border-left-color:#8b5cf6}
.sc-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.sc-icon.g{background:var(--gl);color:var(--g)}
.sc-icon.b{background:#eff6ff;color:#3b82f6}
.sc-icon.o{background:#fff7ed;color:#f97316}
.sc-icon.p{background:#f5f3ff;color:#8b5cf6}
.sc-info h3{font-family:'Syne',sans-serif;font-size:24px;font-weight:900;color:var(--txt)}
.sc-info p{font-size:12px;color:var(--sub);font-weight:600;margin-top:2px}

/* BOOKINGS */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-head h2{font-family:'Syne',sans-serif;font-size:17px;font-weight:900;color:var(--txt)}
.badge-n{background:var(--g);color:#fff;border-radius:50px;padding:3px 11px;font-size:12px;font-weight:800}
.refresh-btn{background:var(--gl);color:var(--g);border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;transition:.2s}
.refresh-btn:hover{background:var(--g);color:#fff}

.bk-card{background:#fff;border-radius:14px;padding:20px 22px;box-shadow:var(--shd);margin-bottom:10px;display:flex;align-items:center;gap:16px;border:1px solid var(--bdr);transition:.2s}
.bk-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.1);transform:translateY(-1px)}
.bk-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.bk-icon.bus{background:#dcfce7;color:var(--g)}
.bk-icon.train{background:#eff6ff;color:#3b82f6}
.bk-icon.plane{background:#fff7ed;color:#f97316}
.bk-info{flex:1}
.bk-route{font-size:16px;font-weight:800;color:var(--txt);margin-bottom:5px;font-family:'Syne',sans-serif}
.bk-meta{display:flex;gap:14px;flex-wrap:wrap}
.bk-meta span{font-size:12px;color:var(--sub);font-weight:600;display:flex;align-items:center;gap:4px}
.bk-right{text-align:right}
.bk-amount{font-family:'Syne',sans-serif;font-size:20px;font-weight:900;color:var(--g)}
.bk-txn{font-size:11px;color:#94a3b8;margin-top:4px;font-family:monospace}
.confirmed-badge{background:#dcfce7;color:var(--g);border-radius:50px;padding:3px 11px;font-size:11px;font-weight:800;display:inline-block;margin-top:6px}

.empty{text-align:center;padding:60px 20px;background:#fff;border-radius:14px;box-shadow:var(--shd)}
.empty i{font-size:48px;color:var(--bdr);margin-bottom:14px;display:block}
.empty h3{font-size:16px;font-weight:800;margin-bottom:6px;color:var(--txt)}
.empty p{font-size:13px;color:var(--sub)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--nav);color:#fff;padding:14px 20px;border-radius:12px;font-weight:700;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,.22);transform:translateY(80px);opacity:0;transition:.3s;z-index:999;display:flex;align-items:center;gap:8px;max-width:340px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-left:4px solid var(--g)}
.toast.err{border-left:4px solid #ef4444}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <div class="logo-box"><i class="fas fa-ticket-alt"></i></div>
    <div class="logo-name">BD<span>Ticket</span></div>
  </a>
  <div class="nav-tabs">
    <a class="nt act" href="/dashboard"><i class="fas fa-home"></i>Home</a>
    <a class="nt" href="/bus"><i class="fas fa-bus"></i>Bus</a>
    <a class="nt" href="/train"><i class="fas fa-train"></i>Train</a>
    <a class="nt" href="/plane"><i class="fas fa-plane"></i>Air</a>
  </div>
  <div class="nav-r">
    <button onclick="logout()"><i class="fas fa-sign-out-alt"></i>Logout</button>
  </div>
</nav>

<!-- HERO SEARCH -->
<div class="hero-bar">
  <h1>Book Your Next <span>Journey</span></h1>
  <p>Search and book tickets across all transport types</p>

  <div class="sw">
    <div class="transport-tabs">
      <button class="tt act" id="tt-bus"   onclick="switchTab('bus')"  ><i class="fas fa-bus"></i>Bus</button>
      <button class="tt"     id="tt-train" onclick="switchTab('train')"><i class="fas fa-train"></i>Train</button>
      <button class="tt"     id="tt-plane" onclick="switchTab('plane')"><i class="fas fa-plane"></i>Air</button>
    </div>

    <div class="search-row">
      <div class="sf"><label><i class="fas fa-map-marker-alt"></i> From</label>
        <select id="source" onchange="updateDestinations()"></select>
      </div>
      <div class="sf"><label><i class="fas fa-map-pin"></i> To</label>
        <select id="destination" onchange="showPrice()"></select>
      </div>
      <div class="sf" style="max-width:180px"><label><i class="fas fa-building"></i> Operator</label>
        <select id="operator"></select>
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:var(--sub);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Price</label>
        <div class="price-badge">৳ <span id="priceDisplay">0</span></div>
      </div>
      <button class="btn-book" onclick="book()"><i class="fas fa-ticket-alt"></i>Book Now</button>
    </div>

    <!-- Payment method pills -->
    <div style="margin-top:16px">
      <label style="font-size:11px;font-weight:700;color:var(--sub);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px"><i class="fas fa-credit-card"></i> Payment Method</label>
      <div class="pay-row" id="payRow"></div>
      <input type="hidden" id="payment" value="bkash">
    </div>
  </div>
</div>

<div class="main">
  <!-- Stats -->
  <div class="stats-row">
    <div class="sc"><div class="sc-icon g"><i class="fas fa-ticket-alt"></i></div><div class="sc-info"><h3 id="sTot">0</h3><p>Total Bookings</p></div></div>
    <div class="sc blue"><div class="sc-icon b"><i class="fas fa-bus"></i></div><div class="sc-info"><h3 id="sBus">0</h3><p>Bus Tickets</p></div></div>
    <div class="sc orange"><div class="sc-icon o"><i class="fas fa-train"></i></div><div class="sc-info"><h3 id="sTrn">0</h3><p>Train Tickets</p></div></div>
    <div class="sc purple"><div class="sc-icon p"><i class="fas fa-plane"></i></div><div class="sc-info"><h3 id="sPln">0</h3><p>Air Tickets</p></div></div>
  </div>

  <!-- History -->
  <div class="sec-head">
    <h2>Booking History <span class="badge-n" id="bkCount">0</span></h2>
    <button class="refresh-btn" onclick="loadBookings()"><i class="fas fa-sync-alt"></i>Refresh</button>
  </div>
  <div id="bkContainer"><div class="empty"><i class="fas fa-spinner fa-spin"></i><h3>Loading...</h3></div></div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/script.js"></script>
<script>
let _curType='bus', _routes=[], _paymentMethods=[];

function switchTab(t){
  _curType=t;
  ['bus','train','plane'].forEach(x=>document.getElementById('tt-'+x).classList.toggle('act',x===t));
  loadRoutes(t);
}

function showToast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.innerHTML=`<i class="fas fa-${type==='ok'?'check-circle':'exclamation-circle'}"></i>${msg}`;
  el.className='toast '+type+' show';
  setTimeout(()=>el.classList.remove('show'),3500);
}

function logout(){localStorage.clear();window.location='/';}

// Load payment methods from backend
fetch('http://127.0.0.1:5000/payment-methods').then(r=>r.json()).then(data=>{
  _paymentMethods=data;
  const row=document.getElementById('payRow');
  row.innerHTML='';
  data.forEach((m,i)=>{
    row.innerHTML+=`<div class="pay-pill${i===0?' sel':''}" onclick="selPay('${m.key}',this)">${m.icon} ${m.label}</div>`;
  });
  document.getElementById('payment').value=data[0]?.key||'bkash';
}).catch(()=>{
  // fallback
  const row=document.getElementById('payRow');
  row.innerHTML=`<div class="pay-pill sel" onclick="selPay('bkash',this)">📱 bKash</div>
  <div class="pay-pill" onclick="selPay('nagad',this)">💚 Nagad</div>
  <div class="pay-pill" onclick="selPay('visa',this)">💳 Visa</div>
  <div class="pay-pill" onclick="selPay('mastercard',this)">💳 MasterCard</div>`;
  document.getElementById('payment').value='bkash';
});

function selPay(key,el){
  document.getElementById('payment').value=key;
  document.querySelectorAll('.pay-pill').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}

window.onload=function(){
  if(!localStorage.getItem('token')){window.location='/';return;}
  switchTab('bus');
  loadBookings();
};
</script>
</body>
</html>

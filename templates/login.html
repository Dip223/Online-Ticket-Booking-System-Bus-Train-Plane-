<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    text-align: center;
}
.box {
    background: white;
    padding: 30px;
    margin: 100px auto;
    width: 300px;
    border-radius: 10px;
}
input, button {
    margin: 10px;
    padding: 10px;
    width: 90%;
}
button {
    background: #4facfe;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p><a href="/register-page">Register</a></p>
<p><a href="/forgot">Forgot Password?</a></p>

</div>

<script src="/static/script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Plane Booking</title>

<style>
body {
    font-family: Arial;
    background: #eef6ff;
    text-align: center;
}

.box {
    background: white;
    padding: 25px;
    margin: 40px auto;
    width: 400px;
    border-radius: 12px;
    box-shadow: 0 0 15px #ccc;
}

select, button {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}
</style>
</head>

<body>

<div class="box">
    <h2>✈️ Plane Booking</h2>

    <!-- ROUTE -->
    <select id="route"></select>

    <!-- AIRLINE -->
    <select id="operator"></select>

    <!-- PAYMENT -->
    <select id="payment">
        <option value="bkash">bKash</option>
        <option value="card">Card</option>
    </select>

    <button onclick="book('Plane')">Book Plane</button>
</div>

<script src="/static/script.js"></script>

<script>
loadPlaneRoutes();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BD Ticket — Flight Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--g:#16a34a;--gd:#14532d;--gl:#dcfce7;--nav:#0f172a;--bg:#f0f4f8;--white:#fff;--txt:#0f172a;--sub:#64748b;--bdr:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
nav{background:var(--nav);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-box{width:38px;height:38px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff}
.logo-name{font-family:'Syne',sans-serif;font-size:21px;font-weight:900;color:#fff}
.logo-name span{color:var(--g)}
.nav-r{display:flex;align-items:center;gap:10px}
.nav-user{color:rgba(255,255,255,.7);font-size:13px;background:rgba(255,255,255,.07);padding:8px 14px;border-radius:8px}
.btn-logout{background:transparent;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15);padding:8px 16px;border-radius:8px;cursor:pointer}

.hero{background:linear-gradient(135deg,#0f172a 0%,#7c2d12 100%);padding:30px 40px;color:#fff}
.hero h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:900}
.hero h1 i{color:#f97316;margin-right:10px}
.hero .trip-info{margin-top:15px;display:flex;gap:30px;flex-wrap:wrap;background:rgba(255,255,255,.1);padding:15px 20px;border-radius:12px}

.container{max-width:1200px;margin:0 auto;padding:30px 24px}
.schedule-grid{display:flex;flex-direction:column;gap:16px}
.schedule-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.05);transition:.2s;border:2px solid transparent}
.schedule-card:hover{transform:translateY(-2px);border-color:#f97316}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.operator-name{font-size:20px;font-weight:900;font-family:'Syne',sans-serif}
.operator-name i{margin-right:8px;color:#f97316}
.price-badge{background:#fff7ed;color:#c2410c;padding:8px 16px;border-radius:50px;font-weight:800}
.departure-times{display:flex;gap:10px;flex-wrap:wrap;margin:15px 0}
.time-slot{background:#f1f5f9;padding:6px 12px;border-radius:20px;font-size:12px}
.select-time-btn{margin-top:15px;padding:10px 20px;background:#f97316;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;width:100%}
.back-btn{display:inline-flex;align-items:center;gap:8px;margin-top:30px;padding:12px 24px;background:#f1f5f9;border:none;border-radius:10px;cursor:pointer}
.toast{position:fixed;bottom:24px;right:24px;background:var(--nav);color:#fff;padding:14px 20px;border-radius:12px;transform:translateY(80px);opacity:0;transition:.3s}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<nav>
  <a href="/dashboard" class="logo">
    <div class="logo-box"><i class="fas fa-ticket-alt"></i></div>
    <div class="logo-name">BD<span>Ticket</span></div>
  </a>
  <div class="nav-r">
    <div class="nav-user"><i class="fas fa-user-circle"></i><span id="navName">User</span></div>
    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Logout</button>
  </div>
</nav>

<div class="hero">
  <h1><i class="fas fa-plane"></i> Select Flight Schedule</h1>
  <div class="trip-info" id="tripInfo"></div>
</div>

<div class="container">
  <div class="schedule-grid" id="scheduleGrid"></div>
  <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back to Search</button>
</div>
<div class="toast" id="toast"></div>

<script>
const journeyData = JSON.parse(sessionStorage.getItem('plane_selection') || '{}');

async function loadSchedules() {
  const res = await fetch("http://127.0.0.1:5000/operators/plane/schedules");
  const operatorsData = await res.json();
  
  document.getElementById("tripInfo").innerHTML = `
    <span><i class="fas fa-map-marker-alt"></i> From: ${journeyData.source}</span>
    <span><i class="fas fa-map-pin"></i> To: ${journeyData.destination}</span>
    <span><i class="fas fa-calendar"></i> Date: ${journeyData.journeyDate}</span>
    <span><i class="fas fa-tag"></i> Price: ৳${journeyData.price}</span>
  `;
  
  displaySchedules(operatorsData);
}

function displaySchedules(operators) {
  const container = document.getElementById("scheduleGrid");
  container.innerHTML = operators.map(op => `
    <div class="schedule-card">
      <div class="card-header">
        <div class="operator-name"><i class="fas fa-building"></i> ${op.name}</div>
        <div class="price-badge">৳ ${journeyData.price}</div>
      </div>
      <div style="display:flex;gap:20px;margin:10px 0"><span><i class="fas fa-clock"></i> Duration: ${op.duration}</span><span><i class="fas fa-chair"></i> Seats: ${op.total_seats}</span></div>
      <div class="departure-times"><strong>Flight Times:</strong> ${op.departure_times.map(t => `<span class="time-slot">${t}</span>`).join('')}</div>
      <button class="select-time-btn" onclick="selectOperator('${op.name}')">Select This Flight</button>
    </div>
  `).join('');
}

function selectOperator(operatorName) {
  journeyData.operator = operatorName;
  sessionStorage.setItem('plane_selection', JSON.stringify(journeyData));
  showToast(`Selected ${operatorName}`, "ok");
  setTimeout(() => window.location = "/plane-payment", 1000);
}

function goBack() { window.location = "/plane"; }
function showToast(msg, type) { const el = document.getElementById("toast"); el.innerHTML = msg; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2000); }
function logout() { localStorage.clear(); window.location = "/"; }

window.onload = function() {
  if (!localStorage.getItem("token") || !journeyData.source) window.location = "/";
  document.getElementById("navName").textContent = localStorage.getItem("name") || "User";
  loadSchedules();
};
</script>
</body>
</html>

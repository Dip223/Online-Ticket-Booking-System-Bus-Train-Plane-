<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        input, button {
            margin: 8px;
            padding: 10px;
            width: 90%;
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
            cursor: pointer;
        }

        #otpBox {
            display: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>📝 Register</h2>

    <input id="name" placeholder="Name"><br>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>

    <button onclick="register()">Send OTP</button>

    <!-- ✅ OTP SECTION -->
    <div id="otpBox">
        <h3>Enter OTP</h3>
        <input id="otp" placeholder="Enter OTP"><br>
        <button onclick="verifyRegisterOTP()">Verify & Create Account</button>
    </div>

    <p>Already have account? <a href="/">Login</a></p>
</div>

<script src="/static/script.js"></script>

</body>
</html>

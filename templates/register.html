<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BD Ticket — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--g:#16a34a;--gd:#14532d;--gl:#dcfce7;--nav:#0f172a;--bg:#f8fafc;--white:#fff;--txt:#0f172a;--sub:#64748b;--bdr:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(145deg,#0f172a 0%,#052e16 60%,#0f172a 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center}
nav{width:100%;background:rgba(255,255,255,.04);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-box{width:36px;height:36px;background:var(--g);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
.logo-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:900;color:#fff}
.logo-name span{color:var(--g)}
.nav-login{color:rgba(255,255,255,.6);font-size:13px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px}
.nav-login:hover{color:#fff}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:36px 20px}
.card{background:#fff;border-radius:22px;padding:44px 40px;width:100%;max-width:460px;box-shadow:0 24px 80px rgba(0,0,0,.35)}
.card-head{text-align:center;margin-bottom:28px}
.card-head h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:900;color:var(--txt);margin-bottom:6px}
.card-head p{font-size:14px;color:var(--sub)}

/* Steps */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:28px}
.step-item{display:flex;flex-direction:column;align-items:center;gap:5px}
.step-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;transition:.3s;font-family:'Syne',sans-serif}
.step-dot.idle{background:#f1f5f9;color:#94a3b8;border:2px solid var(--bdr)}
.step-dot.active{background:var(--gl);color:var(--g);border:2px solid var(--g)}
.step-dot.done{background:var(--g);color:#fff;border:2px solid var(--g)}
.step-lbl{font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:.5px;text-transform:uppercase}
.step-line{width:60px;height:2px;background:var(--bdr);margin-bottom:18px;transition:.3s}
.step-line.done{background:var(--g)}

.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.iw{position:relative}
.iw i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px}
.iw input{width:100%;padding:13px 14px 13px 41px;border:2px solid var(--bdr);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--txt);background:#f8fafc;transition:.2s}
.iw input:focus{outline:none;border-color:var(--g);background:#fff;box-shadow:0 0 0 3px rgba(22,163,74,.1)}

.btn-g{width:100%;padding:14px;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;font-family:'DM Sans',sans-serif;cursor:pointer;transition:.25s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn-g:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(22,163,74,.35)}

/* OTP box */
.otp-box{display:none;background:#f0fdf4;border:2px solid #86efac;border-radius:14px;padding:22px;margin-top:14px}
.otp-box h4{font-size:14px;font-weight:800;color:#15803d;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.otp-box p{font-size:12px;color:#16a34a;margin-bottom:16px}
.otp-input{width:100%;padding:16px;text-align:center;letter-spacing:12px;border:2px solid #86efac;border-radius:10px;font-size:30px;font-weight:900;font-family:'Syne',sans-serif;background:#fff;color:var(--txt);transition:.2s}
.otp-input:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(22,163,74,.12)}
.otp-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.timer{font-size:12px;color:var(--sub);font-weight:600}
.resend-btn{font-size:13px;color:var(--g);font-weight:800;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.resend-btn:disabled{color:#94a3b8;cursor:not-allowed}

.alert{padding:11px 14px;border-radius:9px;font-size:13px;font-weight:700;margin-bottom:14px;display:none;align-items:center;gap:8px}
.alert.err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.alert.ok{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.login-link{text-align:center;font-size:14px;color:var(--sub);margin-top:16px}
.login-link a{color:var(--g);font-weight:800;text-decoration:none}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">
    <div class="logo-box"><i class="fas fa-ticket-alt"></i></div>
    <div class="logo-name">BD<span>Ticket</span></div>
  </a>
  <a href="/" class="nav-login"><i class="fas fa-sign-in-alt"></i>Already registered? Login</a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-head">
      <h2>Create Account 🎉</h2>
      <p>Register to start booking tickets instantly</p>
    </div>

    <!-- Step Indicator -->
    <div class="steps">
      <div class="step-item"><div class="step-dot active" id="sd1">1</div><div class="step-lbl">Details</div></div>
      <div class="step-line" id="sl1"></div>
      <div class="step-item"><div class="step-dot idle" id="sd2">2</div><div class="step-lbl">Verify</div></div>
    </div>

    <div class="alert" id="regAlert"></div>

    <div id="formSection">
      <div class="fg"><label>Full Name</label><div class="iw"><i class="fas fa-user"></i><input id="name" type="text" placeholder="Your full name"></div></div>
      <div class="fg"><label>Email Address</label><div class="iw"><i class="fas fa-envelope"></i><input id="email" type="email" placeholder="your@email.com"></div></div>
      <div class="fg"><label>Password</label><div class="iw"><i class="fas fa-lock"></i><input id="password" type="password" placeholder="Min 6 characters"></div></div>
      <button class="btn-g" onclick="register()"><i class="fas fa-paper-plane"></i>Send Verification OTP</button>
    </div>

    <div class="otp-box" id="otpBox">
      <h4><i class="fas fa-shield-alt"></i>Check Your Email</h4>
      <p>We sent a 6-digit code to your email address.</p>
      <input class="otp-input" id="otp" type="text" maxlength="6" placeholder="••••••" oninput="this.value=this.value.replace(/\D/g,'')">
      <div class="otp-foot">
        <span class="timer" id="timerTxt"></span>
        <button class="resend-btn" id="resendBtn" onclick="register()" disabled>Resend OTP</button>
      </div>
      <button class="btn-g" style="margin-top:16px" onclick="verifyRegisterOTP()"><i class="fas fa-check-circle"></i>Verify &amp; Create Account</button>
    </div>

    <div class="login-link">Already have an account? <a href="/">Login here</a></div>
  </div>
</div>

<script src="/static/script.js"></script>
<script>
let cdInterval;
function startTimer(){
  let s=60;const btn=document.getElementById('resendBtn'),txt=document.getElementById('timerTxt');
  btn.disabled=true;clearInterval(cdInterval);
  cdInterval=setInterval(()=>{txt.textContent='Resend in '+s+'s';s--;if(s<0){clearInterval(cdInterval);txt.textContent='';btn.disabled=false;}},1000);
}
function _alert(id,msg,type){const e=document.getElementById(id);e.innerHTML=`<i class="fas fa-${type==='err'?'exclamation-circle':'check-circle'}"></i>${msg}`;e.className='alert '+type;e.style.display='flex'}
function _stepDone(){
  document.getElementById('sd1').className='step-dot done';document.getElementById('sd1').innerHTML='<i class="fas fa-check" style="font-size:12px"></i>';
  document.getElementById('sl1').className='step-line done';
  document.getElementById('sd2').className='step-dot active';
  document.getElementById('otpBox').style.display='block';
  startTimer();
}
</script>
</body>
</html>

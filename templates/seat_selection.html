<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BD Ticket — Seat Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/seat_ticket.css">

<style>
/* ── Payment Method Selector ── */
.payment-section {
  margin: 18px 0 10px;
  border-top: 1px solid #e2e8f0;
  padding-top: 16px;
}
.payment-section h3 {
  font-size: 13px;
  font-weight: 700;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 10px;
}
.payment-methods {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.payment-method-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  background: #fff;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: #0f172a;
  transition: all .2s;
  text-align: left;
  width: 100%;
}
.payment-method-btn:hover {
  border-color: #94a3b8;
  background: #f8fafc;
}
.payment-method-btn.active {
  border-color: #2563eb;
  background: #eff6ff;
  color: #1d4ed8;
}
.payment-method-btn i {
  width: 20px;
  text-align: center;
  font-size: 16px;
}
.payment-method-btn.bkash.active   { border-color: #e11d48; background: #fff1f2; color: #be123c; }
.payment-method-btn.nagad.active   { border-color: #ea580c; background: #fff7ed; color: #c2410c; }
.payment-method-btn.card.active    { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; }

/* Payment detail fields */
.payment-fields {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.pay-input {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color .2s;
}
.pay-input:focus {
  border-color: #2563eb;
}
.pay-input-row {
  display: flex;
  gap: 8px;
}
.pay-input-row .pay-input {
  flex: 1;
}
</style>
</head>

<body class="{{ transport_type }}">
<nav>
  <a href="/dashboard" class="logo">
    <div class="logo-box">
      <i class="fas fa-ticket-alt"></i>
    </div>
    <div class="logo-name">BD<span>Ticket</span></div>
  </a>

  <button class="nav-btn" onclick="logout()">Logout</button>
</nav>

<div class="page">
  <section class="hero-card">
    <div>
      <span class="badge" id="transportBadge">Seat Selection</span>
      <h1 id="pageTitle">Select Your Seat</h1>
      <p id="journeyText">Loading journey details...</p>
    </div>

    <div class="summary-mini">
      <span>Selected Seat</span>
      <strong id="selectedSeatText">None</strong>
    </div>
  </section>

  <section class="main-grid">
    <div class="seat-card">
      <div class="seat-head">
        <h2 id="layoutTitle">Seat Layout</h2>

        <div class="legend">
          <span><i class="dot available"></i> Available</span>
          <span><i class="dot selected"></i> Selected</span>
          <span><i class="dot booked"></i> Booked</span>
        </div>
      </div>

      <div class="vehicle-shell">
        <div class="front-label" id="frontLabel">FRONT</div>
        <div id="seatGrid" class="seat-grid"></div>
      </div>
    </div>

    <aside class="booking-card">
      <h2>Booking Summary</h2>

      <div class="info-row">
        <span>Transport</span>
        <strong id="sumType">-</strong>
      </div>

      <div class="info-row">
        <span>Route</span>
        <strong id="sumRoute">-</strong>
      </div>

      <div class="info-row">
        <span>Operator</span>
        <strong id="sumOperator">-</strong>
      </div>

      <div class="info-row">
        <span>Date</span>
        <strong id="sumDate">-</strong>
      </div>

      <div class="info-row">
        <span>Fare</span>
        <strong id="sumFare">-</strong>
      </div>

      <div class="info-row">
        <span>Seat Class</span>
        <strong id="sumClass">-</strong>
      </div>

      <!-- ══ PAYMENT METHOD SELECTOR ══ -->
      <div class="payment-section">
        <h3><i class="fas fa-credit-card"></i> Payment Method</h3>
        <div class="payment-methods">
          <button class="payment-method-btn bkash" onclick="selectPayment('bkash')">
            <i class="fas fa-mobile-alt" style="color:#e11d48"></i> bKash
          </button>
          <button class="payment-method-btn nagad" onclick="selectPayment('nagad')">
            <i class="fas fa-wallet" style="color:#ea580c"></i> Nagad
          </button>
          <button class="payment-method-btn card" onclick="selectPayment('card')">
            <i class="fas fa-credit-card" style="color:#2563eb"></i> Credit / Debit Card
          </button>
        </div>

        <!-- bKash / Nagad fields -->
        <div class="payment-fields" id="fieldsPhone" style="display:none">
          <input class="pay-input" id="payPhone" type="tel" placeholder="Phone Number (01XXXXXXXXX)" maxlength="11">
          <input class="pay-input" id="payPin"   type="password" placeholder="PIN (min 4 digits)" maxlength="6">
        </div>

        <!-- Card fields -->
        <div class="payment-fields" id="fieldsCard" style="display:none">
          <input class="pay-input" id="payCardHolder"  type="text"     placeholder="Card Holder Name">
          <input class="pay-input" id="payCardNumber"  type="text"     placeholder="Card Number (16 digits)" maxlength="19">
          <div class="pay-input-row">
            <input class="pay-input" id="payExpiry" type="text" placeholder="MM/YY" maxlength="5">
            <input class="pay-input" id="payCvv"    type="password" placeholder="CVV" maxlength="4">
          </div>
        </div>
      </div>
      <!-- ══ END PAYMENT ══ -->

      <p class="note" id="messageBox">
        Choose an available seat to continue.
      </p>

      <button class="confirm-btn" id="confirmBtn" onclick="confirmBooking()" disabled>
        Confirm Booking & Generate Ticket
      </button>

      <button class="back-btn" onclick="history.back()">
        Back
      </button>
    </aside>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "http://127.0.0.1:5000";
const TRANSPORT_TYPE = "{{ transport_type }}";
const STORAGE_KEY = TRANSPORT_TYPE + "_selection";

let journey = {};
let selectedSeat = null;
let selectedPaymentMethod = null;   // ← tracks chosen payment method

function titleCase(text) {
  return text.charAt(0).toUpperCase() + text.slice(1);
}

function getToken() {
  return localStorage.getItem("token") || "";
}

function logout() {
  localStorage.clear();
  window.location = "/";
}

function showToast(msg, type = "ok") {
  const el = document.getElementById("toast");
  el.innerHTML = msg;
  el.className = "toast " + type + " show";
  setTimeout(() => { el.classList.remove("show"); }, 3500);
}

// ── Payment method selection ──────────────────────────────────────────────────
function selectPayment(method) {
  selectedPaymentMethod = method;

  // Highlight active button
  document.querySelectorAll(".payment-method-btn").forEach(btn => btn.classList.remove("active"));
  document.querySelector(`.payment-method-btn.${method}`).classList.add("active");

  // Show/hide relevant fields
  document.getElementById("fieldsPhone").style.display = (method === "bkash" || method === "nagad") ? "flex" : "none";
  document.getElementById("fieldsCard").style.display  = (method === "card")  ? "flex" : "none";

  // Re-check confirm button state
  updateConfirmButton();
}

function updateConfirmButton() {
  const btn = document.getElementById("confirmBtn");
  btn.disabled = !(selectedSeat && selectedPaymentMethod);
}

// ── Collect payment info from fields ─────────────────────────────────────────
function getPaymentInfo() {
  if (selectedPaymentMethod === "bkash" || selectedPaymentMethod === "nagad") {
    return {
      phone: document.getElementById("payPhone").value.trim(),
      pin:   document.getElementById("payPin").value.trim(),
    };
  }
  if (selectedPaymentMethod === "card") {
    return {
      card_holder:  document.getElementById("payCardHolder").value.trim(),
      card_number:  document.getElementById("payCardNumber").value.replace(/\s/g, "").trim(),
      expiry:       document.getElementById("payExpiry").value.trim(),
      cvv:          document.getElementById("payCvv").value.trim(),
    };
  }
  return {};
}

// ── Journey data ──────────────────────────────────────────────────────────────
function loadJourneyFromStorage() {
  journey = JSON.parse(sessionStorage.getItem(STORAGE_KEY) || "{}");

  if (!journey.source || !journey.destination || !journey.operator || !journey.journeyDate) {
    showToast("Journey data missing. Please select route and operator again.", "err");
    setTimeout(() => { window.location = "/" + TRANSPORT_TYPE; }, 1200);
    return false;
  }

  document.getElementById("transportBadge").textContent = titleCase(TRANSPORT_TYPE);
  document.getElementById("pageTitle").textContent     = `${titleCase(TRANSPORT_TYPE)} Seat Selection`;
  document.getElementById("journeyText").textContent   = `${journey.source} → ${journey.destination}`;

  document.getElementById("sumType").textContent     = titleCase(TRANSPORT_TYPE);
  document.getElementById("sumRoute").textContent    = `${journey.source} → ${journey.destination}`;
  document.getElementById("sumOperator").textContent = journey.operator;
  document.getElementById("sumDate").textContent     = journey.journeyDate;
  document.getElementById("sumFare").textContent     = "৳" + journey.price;

  const layoutTitles = {
    bus:   "Bus Layout — 36 Seats",
    train: "Train Layout — 6 Bogies",
    plane: "Aircraft Seat Map — Business + Economy"
  };
  const frontLabels = {
    bus:   "DRIVER",
    train: "TRAIN — 6 BOGIES",
    plane: "AIRCRAFT CABIN"
  };
  document.getElementById("layoutTitle").textContent = layoutTitles[TRANSPORT_TYPE] || "Seat Layout";
  document.getElementById("frontLabel").textContent  = frontLabels[TRANSPORT_TYPE]  || "FRONT";

  return true;
}

// ── Seat loading & rendering ──────────────────────────────────────────────────
async function loadSeats() {
  const url = `${API}/seats/${TRANSPORT_TYPE}?source=${encodeURIComponent(journey.source)}&destination=${encodeURIComponent(journey.destination)}&operator=${encodeURIComponent(journey.operator)}&journey_date=${encodeURIComponent(journey.journeyDate)}`;
  const res  = await fetch(url);
  const data = await res.json();

  if (!res.ok) {
    showToast(data.message || "Could not load seats.", "err");
    return;
  }
  renderSeats(data.seats || []);
}

function renderSeats(seats) {
  const root = document.getElementById("seatGrid");
  if (TRANSPORT_TYPE === "plane") { renderPlaneCabin(seats, root); return; }
  renderStandardSeats(seats, root);
}

function renderStandardSeats(seats, root) {
  const hasSections = seats.some(seat => seat.section);

  if (hasSections) {
    root.className = "seat-sections";
    root.innerHTML = "";
    const groups = {};
    seats.forEach(seat => {
      const s = seat.section || "Seat Section";
      if (!groups[s]) groups[s] = [];
      groups[s].push(seat);
    });
    Object.keys(groups).forEach(sectionName => {
      const wrapper = document.createElement("div");
      wrapper.className = "seat-section";
      const title = document.createElement("h3");
      title.className = "seat-section-title";
      title.textContent = sectionName;
      const grid = document.createElement("div");
      grid.className = "seat-grid " + (groups[sectionName][0].layout || TRANSPORT_TYPE);
      groups[sectionName].forEach(seat => grid.appendChild(createSeatButton(seat)));
      wrapper.appendChild(title);
      wrapper.appendChild(grid);
      root.appendChild(wrapper);
    });
    return;
  }

  root.className = "seat-grid " + TRANSPORT_TYPE;
  root.innerHTML = "";
  seats.forEach(seat => root.appendChild(createSeatButton(seat)));
}

function renderPlaneCabin(seats, root) {
  root.className = "plane-cabin-ui";
  root.innerHTML = "";

  const businessSeats = seats.filter(s => String(s.class_type || "").toLowerCase().includes("business"));
  const economySeats  = seats.filter(s => !String(s.class_type || "").toLowerCase().includes("business"));
  const bookedCount    = seats.filter(s => s.status === "booked").length;
  const availableCount = seats.length - bookedCount;

  root.innerHTML = `
    <div class="plane-nose">
      <div class="cockpit-icon"><i class="fas fa-plane"></i></div>
      <h3>Aircraft Cabin</h3>
      <p>Select your preferred flight seat</p>
      <div class="plane-stats">
        <div><span>Total Seats</span><strong>${seats.length}</strong></div>
        <div><span>Available</span><strong>${availableCount}</strong></div>
        <div><span>Booked</span><strong>${bookedCount}</strong></div>
      </div>
    </div>
    <div class="plane-seat-sections" id="planeSeatSections"></div>
  `;

  const sections = document.getElementById("planeSeatSections");
  if (businessSeats.length > 0) sections.appendChild(renderPlaneSection("Business Class", "Premium 2 × 2 seating", businessSeats, "plane-business", "business"));
  if (economySeats.length  > 0) sections.appendChild(renderPlaneSection("Economy Class",  "Standard 3 × 3 seating", economySeats,  "plane-economy",  "economy"));
}

function renderPlaneSection(title, subtitle, seats, layoutClass, sectionType) {
  const wrapper = document.createElement("div");
  wrapper.className = "plane-zone " + sectionType;

  const header = document.createElement("div");
  header.className = "plane-zone-header";
  header.innerHTML = `
    <div><h3>${title}</h3><p>${subtitle}</p></div>
    <span>${seats.length} seats</span>
  `;

  const gridWrapper = document.createElement("div");
  gridWrapper.className = "plane-grid-wrapper";

  if (sectionType === "economy") {
    const wingLabels = document.createElement("div");
    wingLabels.className = "plane-wing-labels";
    wingLabels.innerHTML = `<span>LEFT WING</span><span>RIGHT WING</span>`;
    gridWrapper.appendChild(wingLabels);
  }

  const grid = document.createElement("div");
  grid.className = "seat-grid " + layoutClass;
  seats.forEach(seat => grid.appendChild(createSeatButton(seat)));
  gridWrapper.appendChild(grid);

  wrapper.appendChild(header);
  wrapper.appendChild(gridWrapper);
  return wrapper;
}

function createSeatButton(seat) {
  const btn = document.createElement("button");
  const seatClassName = String(seat.class_type || "").toLowerCase().includes("business") ? "business-seat" : "economy-seat";
  btn.className        = `seat ${seat.status} ${seatClassName}`;
  btn.textContent      = seat.seat_no;
  btn.dataset.seatNo   = seat.seat_no;
  btn.dataset.seatClass = seat.class_type;
  btn.disabled         = seat.status === "booked";
  btn.onclick          = () => selectSeat(btn, seat);
  return btn;
}

function selectSeat(button, seat) {
  document.querySelectorAll(".seat.selected").forEach(btn => {
    btn.classList.remove("selected");
    btn.classList.add("available");
  });
  button.classList.remove("available");
  button.classList.add("selected");

  selectedSeat = seat;

  document.getElementById("selectedSeatText").textContent = seat.seat_no;
  document.getElementById("sumClass").textContent         = seat.class_type;
  document.getElementById("messageBox").textContent       = `Seat ${seat.seat_no} selected. Now choose a payment method.`;
  document.getElementById("messageBox").className         = "note success";

  updateConfirmButton();
}

// ── Confirm booking ───────────────────────────────────────────────────────────
async function confirmBooking() {
  if (!selectedSeat) {
    showToast("Please select a seat first.", "err");
    return;
  }

  if (!selectedPaymentMethod) {
    showToast("Please select a payment method. ❌", "err");
    return;
  }

  if (!getToken()) {
    window.location = "/";
    return;
  }

  // Basic frontend validation for phone-based methods
  if (selectedPaymentMethod === "bkash" || selectedPaymentMethod === "nagad") {
    const phone = document.getElementById("payPhone").value.trim();
    const pin   = document.getElementById("payPin").value.trim();
    if (!/^01[0-9]{9}$/.test(phone)) {
      showToast("Invalid phone number. Must be 11 digits starting with 01.", "err");
      return;
    }
    if (pin.length < 4) {
      showToast("PIN must be at least 4 digits.", "err");
      return;
    }
  }

  if (selectedPaymentMethod === "card") {
    const cardHolder = document.getElementById("payCardHolder").value.trim();
    const cardNumber = document.getElementById("payCardNumber").value.replace(/\s/g, "");
    const expiry     = document.getElementById("payExpiry").value.trim();
    const cvv        = document.getElementById("payCvv").value.trim();
    if (!cardHolder)              { showToast("Card holder name is required.", "err"); return; }
    if (!/^\d{13,19}$/.test(cardNumber)) { showToast("Invalid card number.", "err"); return; }
    if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiry)) { showToast("Invalid expiry. Use MM/YY format.", "err"); return; }
    if (!/^\d{3,4}$/.test(cvv))  { showToast("Invalid CVV.", "err"); return; }
  }

  const paymentInfo = getPaymentInfo();

  const payload = {
    type:           titleCase(TRANSPORT_TYPE),
    source:         journey.source,
    destination:    journey.destination,
    price:          journey.price,
    operator:       journey.operator,
    journey_date:   journey.journeyDate,
    departure_time: journey.departure_time || "Selected schedule",
    arrival_time:   journey.arrival_time   || "",
    seat_no:        selectedSeat.seat_no,
    seat_class:     selectedSeat.class_type,
    payment_method: selectedPaymentMethod,   // ← THE FIX
    ...paymentInfo,                           // ← phone/pin or card fields
  };

  try {
    const res  = await fetch(API + "/book", {
      method: "POST",
      headers: {
        "Content-Type":  "application/json",
        "Authorization": "Bearer " + getToken()
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) {
      showToast(data.message || "Booking failed.", "err");
      await loadSeats();
      return;
    }

    showToast("Booking confirmed! Opening ticket... ✅", "ok");
    setTimeout(() => { window.location = "/ticket-view?id=" + data.booking_id; }, 800);

  } catch (error) {
    showToast("Server error. Please check Flask server.", "err");
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.onload = async function() {
  if (!getToken()) { window.location = "/"; return; }
  if (loadJourneyFromStorage()) { await loadSeats(); }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BD Ticket — E-Ticket</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/seat_ticket.css">

<!-- QR Code library — renders a real scannable QR into a <canvas> -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
/* ── QR code container ── */
#qrCanvas {
  width: 160px !important;
  height: 160px !important;
  margin: 0 auto 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* qrcode.js renders a <canvas> or <img> inside the div */
#qrCanvas canvas,
#qrCanvas img {
  width: 160px !important;
  height: 160px !important;
  border-radius: 8px;
  display: block;
}

/* ── Print styles ── */
@media print {
  nav,
  .ticket-actions {
    display: none !important;
  }

  body {
    background: #fff !important;
  }

  .page {
    padding: 0 !important;
  }

  /* Make sure canvas / img inside QR prints */
  #qrCanvas,
  #qrCanvas canvas,
  #qrCanvas img {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  .ticket-card {
    box-shadow: none !important;
    border: 1px solid #e2e8f0 !important;
    page-break-inside: avoid;
  }

  .ticket-code-side {
    page-break-inside: avoid;
  }
}
</style>
</head>

<body>
<nav>
  <a href="/dashboard" class="logo">
    <div class="logo-box">
      <i class="fas fa-ticket-alt"></i>
    </div>
    <div class="logo-name">BD<span>Ticket</span></div>
  </a>

  <button class="nav-btn" onclick="logout()">Logout</button>
</nav>

<div class="page">
  <div id="ticketRoot" class="loading-card">
    <i class="fas fa-spinner fa-spin"></i>
    <h2>Loading ticket...</h2>
  </div>
</div>

<script>
const API = "http://127.0.0.1:5000";

function getToken() {
  return localStorage.getItem("token") || "";
}

function logout() {
  localStorage.clear();
  window.location = "/";
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<",  "&lt;")
    .replaceAll(">",  "&gt;")
    .replaceAll('"',  "&quot;")
    .replaceAll("'",  "&#039;");
}

function sectionHtml(section) {
  const rows = Object.entries(section.rows || {}).map(([key, value]) => `
    <div class="ticket-row">
      <span>${escapeHtml(key)}</span>
      <strong>${escapeHtml(value)}</strong>
    </div>
  `).join("");

  return `
    <div class="ticket-section">
      <h2>${escapeHtml(section.title)}</h2>
      <div class="ticket-rows">${rows}</div>
    </div>
  `;
}

/**
 * Generates a real QR code into #qrCanvas using qrcode.js.
 * The QR encodes the ticket code + ticket ID so it's scannable.
 */
function generateQR(ticket) {
  const container = document.getElementById("qrCanvas");
  if (!container) return;

  // Clear any previous content
  container.innerHTML = "";

  // Build the string to encode — ticket ID + code makes it uniquely scannable
  const qrData = [
    "BD-TICKET",
    ticket.ticket_id   || "",
    ticket.ticket_code || "",
    ticket.route_line  || "",
    ticket.status      || "",
  ].join(" | ");

  try {
    new QRCode(container, {
      text:          qrData,
      width:         160,
      height:        160,
      colorDark:     "#0f172a",
      colorLight:    "#ffffff",
      correctLevel:  QRCode.CorrectLevel.M,
    });
  } catch (err) {
    // Graceful fallback if library fails
    container.innerHTML = `
      <div style="width:160px;height:160px;background:#f1f5f9;border-radius:8px;
                  display:flex;align-items:center;justify-content:center;
                  font-size:11px;color:#64748b;text-align:center;padding:10px;">
        QR Unavailable<br>${escapeHtml(ticket.ticket_code)}
      </div>`;
  }
}

function renderTicket(ticket) {
  document.body.className = ticket.theme || "";

  document.getElementById("ticketRoot").className = "";

  document.getElementById("ticketRoot").innerHTML = `
    <div class="ticket-card">
      <div class="ticket-top">
        <div class="ticket-title-area">
          <div class="ticket-icon">
            <i class="fas ${escapeHtml(ticket.icon)}"></i>
          </div>
          <div>
            <h1>${escapeHtml(ticket.title)}</h1>
            <p>${escapeHtml(ticket.subtitle)}</p>
          </div>
        </div>

        <div class="ticket-id-box">
          <span>Ticket ID</span>
          <strong>${escapeHtml(ticket.ticket_id)}</strong>
        </div>
      </div>

      <div class="route-band">
        <div class="route-text">${escapeHtml(ticket.route_line)}</div>
        <div class="status-pill">${escapeHtml(ticket.status)}</div>
      </div>

      <div class="ticket-body">
        <div class="ticket-info">
          ${(ticket.sections || []).map(sectionHtml).join("")}
        </div>

        <div class="ticket-code-side">
          <!-- Real QR code rendered here by generateQR() -->
          <div id="qrCanvas"></div>
          <span>Ticket Code</span>
          <strong>${escapeHtml(ticket.ticket_code)}</strong>
          <small>Issued: ${escapeHtml(ticket.issue_time)}</small>
        </div>
      </div>

      <div class="ticket-footer">
        <i class="fas fa-info-circle"></i> ${escapeHtml(ticket.footer_note)}
      </div>
    </div>

    <div class="ticket-actions">
      <button onclick="window.print()" class="primary-action">
        <i class="fas fa-print"></i> Print / Save as PDF
      </button>

      <button onclick="window.location='/dashboard'" class="secondary-action">
        Back to Dashboard
      </button>
    </div>
  `;

  // Generate the real QR code after the DOM is updated
  generateQR(ticket);
}

async function loadTicket() {
  if (!getToken()) {
    window.location = "/";
    return;
  }

  const bookingId = new URLSearchParams(window.location.search).get("id");

  if (!bookingId) {
    document.getElementById("ticketRoot").className = "error-card";
    document.getElementById("ticketRoot").innerHTML = "Missing booking ID.";
    return;
  }

  try {
    const response = await fetch(`${API}/ticket-data/${bookingId}`, {
      headers: { "Authorization": "Bearer " + getToken() }
    });

    const data = await response.json();

    if (!response.ok) {
      document.getElementById("ticketRoot").className = "error-card";
      document.getElementById("ticketRoot").innerHTML = data.message || "Could not load ticket.";
      return;
    }

    renderTicket(data.ticket_view);

  } catch (error) {
    document.getElementById("ticketRoot").className = "error-card";
    document.getElementById("ticketRoot").innerHTML = "Server error. Please check Flask server.";
  }
}

window.onload = loadTicket;
</script>
</body>
</html>

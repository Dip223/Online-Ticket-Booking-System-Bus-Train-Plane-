<!DOCTYPE html>
<html>
<head>
<title>Train Booking</title>

<style>
body {
    font-family: Arial;
    background: #f0fff4;
    text-align: center;
}

.box {
    background: white;
    padding: 25px;
    margin: 40px auto;
    width: 400px;
    border-radius: 12px;
    box-shadow: 0 0 15px #ccc;
}

select, button {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    background: #ff9800;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #e68900;
}
</style>
</head>

<body>

<div class="box">
    <h2>🚆 Train Booking</h2>

    <!-- ROUTE -->
    <select id="route"></select>

    <!-- TRAIN NAME -->
    <select id="operator"></select>

    <!-- PAYMENT -->
    <select id="payment">
        <option value="bkash">bKash</option>
        <option value="card">Card</option>
    </select>

    <button onclick="book('Train')">Book Train</button>
</div>

<script src="/static/script.js"></script>

<script>
loadTrainRoutes();
</script>

</body>
</html>
